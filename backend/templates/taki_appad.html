<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                 'Helvetica Neue', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* ── CANVAS ───────────────────────────────────────────────────────────
   Full 1080×1080 square. 40 px padding on all sides = 1000×1000 inner.
   Column of: nav (120px) → card (450px) → gap → bubble.
   ──────────────────────────────────────────────────────────────────── */
.canvas {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(180deg, #B8D9F5 0%, #F0F4FF 100%);
    padding: 40px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── NAV BAR — ~120 px tall ────────────────────────────────────────── */
.nav-bar {
    flex-shrink: 0;
    height: 156px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
}

/* Large pink back-arrow — matches reference color & size */
.back-arrow {
    width: 78px;
    font-size: 88px;
    font-weight: 400;
    color: #FF4FA3;
    line-height: 1;
    display: flex;
    align-items: center;
    padding-bottom: 6px;   /* optical vertical centering of ‹ */
}

/* "Taki" fallback text — only shown when logo is absent */
.app-title {
    font-size: 80px;
    font-weight: 900;
    color: #FF4FA3;
    letter-spacing: -1.5px;
    line-height: 1;
}

/* Logo image — height matches the visual weight of .app-title */
.logo-img {
    height: 94px;
    width: auto;
    object-fit: contain;
    display: block;
    background: none;
    border: none;
    outline: none;
    box-shadow: none;
    padding: 0;
    mix-blend-mode: multiply;   /* removes white bg if logo has it */
}

/* Large pink "+" circle */
.plus-btn {
    width: 94px;
    height: 94px;
    background: #FF4FA3;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 52px;
    font-weight: 300;
    line-height: 1;
    padding-bottom: 2px;
}

/* ── WHITE CARD — landscape rectangle, ~45 % of canvas height ─────────
   1000 px wide (full inner) × 450 px tall.
   10 px white padding creates the visible "picture frame" effect.
   ──────────────────────────────────────────────────────────────────── */
.white-card {
    flex-shrink: 0;
    width: 100%;
    height: 450px;
    background: #ffffff;
    border-radius: 28px;
    box-shadow: 0 6px 28px rgba(0, 0, 0, 0.12);
    padding: 12px;
    margin-bottom: 48px;
    overflow: hidden;
}

/* ── INNER BLACK AREA — fills white card with frame visible ──────────── */
.black-inner {
    width: 100%;
    height: 100%;
    background: #000000;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.black-inner img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.black-inner-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 80px;
}

/* ── OUTGOING BUBBLE (suggested reply / next message) ─────────────────
   Right-aligned, ~84 % of inner width. Large bold white text on sky blue.
   Layout math: 40+120+28+450+48 = 686px consumed from top.
   Remaining inner: 1000-686 = 314px for bubble + bottom breathing room.
   2 lines × 48px × 1.35 + 80px padding ≈ 210px  →  fits with 104px spare.
   ──────────────────────────────────────────────────────────────────── */
.outgoing-bubble {
    flex-shrink: 0;
    align-self: flex-end;
    max-width: 840px;       /* 84 % of inner 1000 px */
    background: #29AEFF;
    color: #ffffff;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.35;
    border-radius: 36px;
    padding: 40px 48px;
    word-break: break-word;

    /* cap at 3 lines — never overflows canvas */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>
<body>
<div class="canvas">

    <!-- NAV BAR -->
    <div class="nav-bar">
        <span class="back-arrow">&#8249;</span>
        {% if logo_url %}
            <img src="{{ logo_url }}" class="logo-img" alt="Taki" />
        {% else %}
            <span class="app-title">Taki</span>
        {% endif %}
        <div class="plus-btn">+</div>
    </div>

    <!-- WHITE CARD: landscape rectangle with black inner + DM screenshot -->
    <div class="white-card">
        <div class="black-inner">
            {% if dm_screenshot_url %}
                <img src="{{ dm_screenshot_url }}" alt="DM screenshot" />
            {% else %}
                <div class="black-inner-empty">💬</div>
            {% endif %}
        </div>
    </div>

    <!-- OUTGOING BUBBLE — suggested reply shown below the card -->
    <div class="outgoing-bubble">{{ next_message }}</div>

</div>
</body>
</html>
