<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                 'Helvetica Neue', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background: linear-gradient(180deg, #e8f4ff 0%, #c8e8ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ═══════════════════════════════════════════════════════════
   HEADER — top 8 % → taller to fit the large Taki title
   186 px keeps "Taki" optically centred with generous breathing room
   ─────────────────────────────────────────────────────────── */
.header {
    width: 1080px;
    height: 186px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 56px;
}

.back-arrow {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 68px;
    font-weight: 400;
    color: #FF4D8D;
    line-height: 1;
    padding-bottom: 4px;
}

/* "Taki" is the most dominant element on the slide */
.app-title {
    font-size: 120px;
    font-weight: 900;
    color: #FF4D8D;
    letter-spacing: -2px;
    line-height: 1;
}

.plus-btn {
    width: 80px;
    height: 80px;
    background: #FF4D8D;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 50px;
    font-weight: 300;
    line-height: 1;
    padding-bottom: 3px;
}

/* ═══════════════════════════════════════════════════════════
   SPACER — header is 186 px; 15 % of 1920 = 288 px → gap = 102 px
   ─────────────────────────────────────────────────────────── */
.spacer-top {
    height: 102px;
    flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════
   PHONE MOCKUP — 4 : 5 ratio, −20 % from original
   Width  = 672 px  →  Height = 672 × 5/4 = 840 px
   White bg, 8 px solid white border, 24 px rounded corners,
   subtle blue-tinted drop shadow.

   DM screenshot uses object-fit:contain so the FULL portrait
   slide (1080×1920) is always visible — no cropping of messages.
   The DM has a black background; any letterbox bars blend in.
   ─────────────────────────────────────────────────────────── */
.phone-section {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
}

.phone-frame {
    width: 672px;
    height: 840px;       /* 4 : 5,  −20 % */
    background: #111;    /* dark bg so letterbox bars are invisible */
    border: 8px solid white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
        0 16px 48px rgba(30, 80, 200, 0.16),
        0  4px 16px rgba(20, 60, 160, 0.10);
}

.phone-frame img {
    width: 100%;
    height: 100%;
    /* contain = show the FULL DM PNG; portrait DM fits by height,
       leaving narrow side bars that blend with the dark frame bg  */
    object-fit: contain;
    display: block;
}

.phone-frame-empty {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 96px;
}

/* ═══════════════════════════════════════════════════════════
   FLEXIBLE GAP — pushes the bottom zone to the last 25 %
   ─────────────────────────────────────────────────────────── */
.gap {
    flex: 1;
    min-height: 48px;
}

/* ═══════════════════════════════════════════════════════════
   BOTTOM ZONE — last 25 % = 480 px
   Stack: tap-to-copy hint  →  blue pill bubble  →  pad
   ─────────────────────────────────────────────────────────── */
.bottom-zone {
    height: 480px;
    flex-shrink: 0;
    width: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px 72px;
    gap: 28px;
}

/* "tap to copy" sits ABOVE the bubble, centred */
.tap-copy {
    color: #A0A0A0;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 0.2px;
    text-align: center;
    width: 100%;
}

/* Blue pill bubble — 85 % of 1080 px = 918 px wide */
.ai-bubble {
    width: 918px;          /* 85 % of 1080 */
    background: #2196F3;
    border-radius: 999px;  /* fully rounded pill */
    padding: 40px 56px;
    color: white;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.4;
    text-align: left;
    word-break: break-word;

    /* cap at 2 lines so the bubble never overflows the zone */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="back-arrow">&#8249;</div>
    <div class="app-title">Taki</div>
    <div class="plus-btn">+</div>
</div>

<!-- GAP: header bottom → 15 % mark -->
<div class="spacer-top"></div>

<!-- PHONE MOCKUP -->
<div class="phone-section">
    <div class="phone-frame">
        {% if dm_screenshot_url %}
            <img src="{{ dm_screenshot_url }}" alt="DM screenshot" />
        {% else %}
            <div class="phone-frame-empty">💬</div>
        {% endif %}
    </div>
</div>

<!-- ELASTIC GAP -->
<div class="gap"></div>

<!-- BOTTOM ZONE: tap-to-copy + blue bubble -->
<div class="bottom-zone">
    <div class="tap-copy">tap to copy</div>
    <div class="ai-bubble">{{ next_message }}</div>
</div>

</body>
</html>
