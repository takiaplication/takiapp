<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                 'Helvetica Neue', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* ── CANVAS ───────────────────────────────────────────────── */
.canvas {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(180deg, #B8D9F5 0%, #F0F4FF 100%);
    padding: 40px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
}

/* ── NAV BAR ──────────────────────────────────────────────── */
.nav-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 68px;
    margin-bottom: 20px;
}

.back-arrow {
    font-size: 28px;
    font-weight: 700;
    color: #2D2D2D;
    line-height: 1;
    width: 48px;
    display: flex;
    align-items: center;
}

/* Taki text — fallback when logo image is unavailable */
.app-title {
    font-size: 36px;
    font-weight: 800;
    color: #FF4FA3;
    letter-spacing: -0.5px;
    line-height: 1;
}

/* Logo image — matches visual weight of text fallback */
.logo-img {
    height: 52px;
    width: auto;
    object-fit: contain;
    display: block;
}

.plus-btn {
    width: 48px;
    height: 48px;
    background: #FF4FA3;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 26px;
    font-weight: 400;
    line-height: 1;
}

/* ── WHITE CARD ───────────────────────────────────────────── */
/* Takes all remaining vertical space between nav and bubble.
   Width is 88 % of the 1000 px inner content area = 880 px.
   The card is therefore wider than it is tall — matching the
   reference screenshot — because the bubble is fixed-height. */
.white-card {
    flex: 1;
    min-height: 0;         /* allow flex child to shrink below content size */
    width: 880px;          /* 88 % of inner 1000 px */
    align-self: center;
    background: #ffffff;
    border-radius: 28px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    padding: 10px;
    margin-bottom: 24px;
    overflow: hidden;
}

/* ── INNER BLACK AREA ─────────────────────────────────────── */
/* Fills the white card with a 10 px white "frame" visible
   around all four edges.  The cropped DM PNG is embedded here
   with object-fit: contain so no bubble is cut off.          */
.black-inner {
    width: 100%;
    height: 100%;
    background: #000000;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.black-inner img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.black-inner-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    font-size: 64px;
}

/* ── OUTGOING BUBBLE ──────────────────────────────────────── */
/* Sits on the gradient background below the white card.
   Aligned to the right edge of the canvas content area.      */
.outgoing-bubble {
    flex-shrink: 0;
    align-self: flex-end;
    max-width: 800px;      /* 80 % of inner 1000 px */
    background: #29AEFF;
    color: #ffffff;
    font-size: 36px;
    font-weight: 600;
    line-height: 1.4;
    border-radius: 22px;
    padding: 24px 32px;
    word-break: break-word;

    /* cap at 3 lines so bubble never overflows canvas */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>
<body>
<div class="canvas">

    <!-- NAV BAR -->
    <div class="nav-bar">
        <span class="back-arrow">&#8249;</span>
        {% if logo_url %}
            <img src="{{ logo_url }}" class="logo-img" alt="Taki" />
        {% else %}
            <span class="app-title">Taki</span>
        {% endif %}
        <div class="plus-btn">+</div>
    </div>

    <!-- WHITE CARD with cropped DM screenshot inside -->
    <div class="white-card">
        <div class="black-inner">
            {% if dm_screenshot_url %}
                <img src="{{ dm_screenshot_url }}" alt="DM screenshot" />
            {% else %}
                <div class="black-inner-empty">💬</div>
            {% endif %}
        </div>
    </div>

    <!-- OUTGOING BUBBLE (suggested reply / next message) -->
    <div class="outgoing-bubble">{{ next_message }}</div>

</div>
</body>
</html>
