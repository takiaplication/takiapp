<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                 'Helvetica Neue', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background: linear-gradient(180deg, #e8f4ff 0%, #c8e8ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ═══════════════════════════════════════════════════════════
   HEADER — pink back-arrow  |  Taki logo/text  |  pink + circle
   ─────────────────────────────────────────────────────────── */
.header {
    width: 1080px;
    height: 186px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 56px;
}

.back-arrow {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 68px;
    font-weight: 400;
    color: #FF4D8D;
    line-height: 1;
    padding-bottom: 4px;
}

/* "Taki" text — only shown when the logo image is unavailable */
.app-title {
    font-size: 120px;
    font-weight: 900;
    color: #FF4D8D;
    letter-spacing: -2px;
    line-height: 1;
}

/* Logo image */
.logo-img {
    height: 96px;
    width: auto;
    object-fit: contain;
    display: block;
}

.plus-btn {
    width: 80px;
    height: 80px;
    background: #FF4D8D;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 50px;
    font-weight: 300;
    line-height: 1;
    padding-bottom: 3px;
}

/* ═══════════════════════════════════════════════════════════
   SPACER between header and frame
   ─────────────────────────────────────────────────────────── */
.spacer-top {
    height: 40px;
    flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════
   PHONE MOCKUP — 1 : 1 square, 85 % of screen width = 918 px
   Thick white border (14 px) + large radius (36 px) matches
   the card look in the reference screenshot.
   The DM PNG is pre-cropped to the bubble bounding-box so the
   frame shows actual conversation instead of a black void.
   ─────────────────────────────────────────────────────────── */
.phone-section {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
}

.phone-frame {
    width: 918px;
    height: 918px;
    background: #000;
    border: 14px solid white;
    border-radius: 36px;
    overflow: hidden;
    box-shadow:
        0 20px 60px rgba(30, 80, 200, 0.18),
        0  6px 20px rgba(20, 60, 160, 0.12);
}

.phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.phone-frame-empty {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 96px;
}

/* ═══════════════════════════════════════════════════════════
   FLEXIBLE GAP — pushes bubble to the last ~28 %
   ─────────────────────────────────────────────────────────── */
.gap {
    flex: 1;
    min-height: 40px;
}

/* ═══════════════════════════════════════════════════════════
   BOTTOM ZONE — just the blue rounded-rect bubble, centred
   ─────────────────────────────────────────────────────────── */
.bottom-zone {
    height: 520px;
    flex-shrink: 0;
    width: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px 80px;
}

/* Blue rounded-rectangle bubble — matches reference screenshot.
   NOT a pill: border-radius 48 px gives the card-style corners. */
.ai-bubble {
    width: 918px;
    background: #2196F3;
    border-radius: 48px;
    padding: 56px 64px;
    color: white;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.4;
    text-align: left;
    word-break: break-word;

    /* cap at 3 lines so the bubble never overflows the zone */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="back-arrow">&#8249;</div>
    {% if logo_url %}
        <img src="{{ logo_url }}" class="logo-img" alt="Taki" />
    {% else %}
        <div class="app-title">Taki</div>
    {% endif %}
    <div class="plus-btn">+</div>
</div>

<!-- SPACER -->
<div class="spacer-top"></div>

<!-- PHONE MOCKUP -->
<div class="phone-section">
    <div class="phone-frame">
        {% if dm_screenshot_url %}
            <img src="{{ dm_screenshot_url }}" alt="DM screenshot" />
        {% else %}
            <div class="phone-frame-empty">💬</div>
        {% endif %}
    </div>
</div>

<!-- ELASTIC GAP -->
<div class="gap"></div>

<!-- BOTTOM ZONE: blue rounded-rect bubble only -->
<div class="bottom-zone">
    <div class="ai-bubble">{{ next_message }}</div>
</div>

</body>
</html>
